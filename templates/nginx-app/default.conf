map $http_origin $cors_origin {
    default "";
    "~^https?://{{PROJECT_DOMAIN}}$" "$http_origin";
    "~^https?://localhost(:[0-9]+)?$" "$http_origin";
}

upstream backend {
    server {{PROJECT_NAME}}_backend:{{BACKEND_PORT}};
}

# HTTP server
server {
    listen 80;
    server_name {{PROJECT_DOMAIN}};

    # CORS headers
    add_header 'Access-Control-Allow-Origin' $cors_origin always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;

    # Preflight OPTIONS
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $cors_origin;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
        add_header 'Access-Control-Max-Age' 1728000;
        add_header 'Content-Type' 'text/plain; charset=utf-8';
        add_header 'Content-Length' 0;
        return 204;
    }

    # API proxy — strip /api/v1/ prefix
    location /api/v1/ {
        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # BOT_WEBHOOK_LOCATION

    # FRONTEND_LOCATION
}

# gRPC server (internal, accessed by edge proxy)
server {
    listen 50052;
    http2 on;
    server_name {{PROJECT_DOMAIN}};

    proxy_buffering off;

    grpc_read_timeout 600s;
    grpc_send_timeout 600s;
    grpc_connect_timeout 60s;
    client_body_timeout 600s;
    client_header_timeout 60s;
    grpc_socket_keepalive on;

    location / {
        grpc_pass grpc://{{PROJECT_NAME}}_backend:{{GRPC_PORT}};
        grpc_set_header Host $host;
        grpc_set_header X-Real-IP $remote_addr;
        grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        grpc_set_header X-Forwarded-Proto $scheme;
        error_page 502 = /grpc_error;
    }

    location = /grpc_error {
        internal;
        default_type application/grpc;
        add_header grpc-status 14;
        add_header grpc-message "unavailable";
        return 204;
    }
}
