http:
  routers:
    # API router — strip /api/v1 prefix
    {{PROJECT_NAME}}-api:
      rule: "Host(`{{PROJECT_DOMAIN}}`) && PathPrefix(`/api/v1`)"
      entryPoints:
        - websecure
      service: {{PROJECT_NAME}}-api
      tls:
        certResolver: le
      middlewares:
        - {{PROJECT_NAME}}-strip-api
        - {{PROJECT_NAME}}-cors

    # gRPC router — Content-Type or proto path prefix
    {{PROJECT_NAME}}-grpc:
      rule: "Host(`{{PROJECT_DOMAIN}}`) && (HeaderRegexp(`Content-Type`, `^application/grpc`) || PathPrefix(`/{{PROJECT_NAME}}.`))"
      entryPoints:
        - websecure
      service: {{PROJECT_NAME}}-grpc
      priority: 100
      tls:
        certResolver: le

    # BOT_ROUTER

    # FRONTEND_ROUTER

  services:
    {{PROJECT_NAME}}-api:
      loadBalancer:
        servers:
          - url: "http://{{PROJECT_NAME}}_backend:{{BACKEND_PORT}}"

    {{PROJECT_NAME}}-grpc:
      loadBalancer:
        servers:
          - url: "h2c://{{PROJECT_NAME}}_backend:{{GRPC_PORT}}"

    # FRONTEND_SERVICE

  middlewares:
    {{PROJECT_NAME}}-strip-api:
      stripPrefix:
        prefixes:
          - "/api/v1"
    {{PROJECT_NAME}}-cors:
      headers:
        accessControlAllowOriginList:
          - "https://{{PROJECT_DOMAIN}}"
          - "http://localhost:5173"
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
        accessControlAllowHeaders:
          - Content-Type
          - Authorization
          - X-Requested-With
        accessControlAllowCredentials: true
        accessControlMaxAge: 1728000
