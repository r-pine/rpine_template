services:
  postgres:
    image: postgres:15
    container_name: postgres-{{PROJECT_NAME}}
    volumes:
      - ./.docker-volumes/pg_data:/var/lib/postgresql/data
    env_file:
      - .envs/.env
    ports:
      - "{{POSTGRES_PORT}}:{{POSTGRES_PORT}}"
    command: postgres -c timezone=Europe/Moscow -p {{POSTGRES_PORT}}
    restart: always

  redis:
    image: redis:7
    container_name: redis-{{PROJECT_NAME}}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--port", "{{REDIS_PORT}}"]
    env_file:
      - .envs/.env
    ports:
      - "{{REDIS_PORT}}:{{REDIS_PORT}}"
    restart: always

networks:
  default:
    external: true
    name: shared-web
