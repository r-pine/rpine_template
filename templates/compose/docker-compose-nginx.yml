
  nginx:
    image: nginx:alpine
    container_name: {{PROJECT_NAME}}_nginx
    volumes:
      - ./nginx-app/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-app/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "{{NGINX_PORT}}:80"
      - "{{GRPC_EXTERNAL_PORT}}:50052"
    depends_on:
      - backend
    restart: always
